<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal FB Video Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 12px;
        }
        /* Reel / Portrait Mode */
        .video-container.portrait {
            padding-bottom: 177.77%; /* 9:16 Aspect Ratio */
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-2xl mt-10">
        <h1 class="text-3xl font-bold text-center mb-6 text-blue-500">FB Universal Player</h1>
        
        <!-- Input Section -->
        <div class="flex gap-2 mb-8">
            <input type="text" id="fbUrl" 
                placeholder="Paste Reel, Live, or Video URL here..." 
                class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none focus:border-blue-500 transition-all">
            <button onclick="playVideo()" 
                class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg font-bold transition-all">
                PLAY
            </button>
        </div>

        <!-- Player Area -->
        <div id="playerWrapper" class="hidden">
            <div id="vidContainer" class="video-container shadow-2xl">
                <iframe id="fbIframe" 
                    src="" 
                    scrolling="no" 
                    frameborder="0" 
                    allowfullscreen="true" 
                    allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
                </iframe>
            </div>
            
            <div class="mt-4 flex justify-between items-center text-sm text-gray-400">
                <p id="statusTxtText">Playing content from Facebook</p>
                <button onclick="toggleAspect()" class="text-blue-400 hover:underline">Switch Aspect Ratio (16:9 / 9:16)</button>
            </div>
        </div>

        <!-- Help Info -->
        <div id="instructions" class="mt-10 text-gray-500 text-center text-sm">
            <p>Supports: facebook.com/reels, fb.watch, facebook.com/live, etc.</p>
            <p class="mt-2 italic text-gray-600">Note: Private videos cannot be played outside of Facebook.</p>
        </div>
    </div>

    <script>
        function playVideo() {
            const inputUrl = document.getElementById('fbUrl').value.trim();
            const iframe = document.getElementById('fbIframe');
            const wrapper = document.getElementById('playerWrapper');
            const container = document.getElementById('vidContainer');
            const instructions = document.getElementById('instructions');

            if (!inputUrl) {
                alert("Please paste a URL first!");
                return;
            }

            // 1. Clean the URL (Remove tracking parameters like mibextid)
            try {
                const urlObj = new URL(inputUrl);
                // Keep only the main link
                const cleanUrl = urlObj.origin + urlObj.pathname + (urlObj.searchParams.get('v') ? '?v=' + urlObj.searchParams.get('v') : '');
                
                // 2. Encode for the Facebook Plugin
                const encodedUrl = encodeURIComponent(inputUrl);
                
                // 3. Set the official Facebook Embed Plugin Source
                const embedSrc = `https://www.facebook.com/plugins/video.php?href=${encodedUrl}&show_text=0&autoplay=1`;

                // 4. Auto-detect if it's a Reel for Aspect Ratio
                if (inputUrl.includes('reels') || inputUrl.includes('reel')) {
                    container.classList.add('portrait');
                } else {
                    container.classList.remove('portrait');
                }

                // 5. Update UI
                iframe.src = embedSrc;
                wrapper.classList.remove('hidden');
                instructions.classList.add('hidden');
            } catch (e) {
                alert("Invalid URL format. Please copy a link from Facebook.");
            }
        }

        function toggleAspect() {
            const container = document.getElementById('vidContainer');
            container.classList.toggle('portrait');
        }

        // Allow "Enter" key to trigger play
        document.getElementById('fbUrl').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') playVideo();
        });
    </script>
</body>
</html>
