<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate FB Video Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
        }
        .portrait { padding-bottom: 177.77% !important; } /* 9:16 */
        iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen p-4 font-sans">

    <div class="max-w-3xl mx-auto mt-10">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-blue-500 mb-2">FB Player Pro</h1>
            <p class="text-gray-400">Works with Reels, Live, and Share links</p>
        </header>

        <!-- Input Box -->
        <div class="bg-gray-900 p-6 rounded-2xl shadow-xl border border-gray-800">
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="fbUrl" 
                    placeholder="Paste link here (e.g., https://www.facebook.com/share/v/...)" 
                    class="flex-1 p-4 rounded-xl bg-gray-800 border border-gray-700 focus:ring-2 focus:ring-blue-500 outline-none text-white transition-all">
                <button onclick="processVideo()" id="playBtn"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-4 rounded-xl transition-all flex items-center justify-center">
                    <span id="btnText">PLAY VIDEO</span>
                </button>
            </div>
            <p id="errorLog" class="text-red-400 mt-3 text-sm hidden"></p>
        </div>

        <!-- Video Display -->
        <div id="playerSection" class="mt-8 hidden">
            <div id="vidContainer" class="video-container shadow-2xl border border-gray-800">
                <iframe id="fbIframe" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>
            </div>
            
            <div class="mt-4 flex flex-wrap gap-4 justify-between items-center bg-gray-900 p-4 rounded-xl">
                <div>
                    <span class="text-xs font-bold text-gray-500 uppercase block">Currently Playing</span>
                    <span id="playingUrl" class="text-sm text-blue-400 break-all"></span>
                </div>
                <button onclick="toggleRatio()" class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider">
                    🔄 Switch Aspect Ratio
                </button>
            </div>
        </div>
    </div>

    <script>
        async function processVideo() {
            const input = document.getElementById('fbUrl').value.trim();
            const btnText = document.getElementById('btnText');
            const errorLog = document.getElementById('errorLog');
            const playerSection = document.getElementById('playerSection');
            const iframe = document.getElementById('fbIframe');
            const playingUrlTxt = document.getElementById('playingUrl');

            if (!input) return;

            // Reset UI
            errorLog.classList.add('hidden');
            btnText.innerHTML = '<span class="loader"></span> Resolving...';
            
            let finalUrl = input;

            try {
                // HANDLE SHARE LINKS (The link you provided)
                // We use a CORS proxy to find the real destination of the /share/ redirect
                if (input.includes('facebook.com/share')) {
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(input)}`;
                    const response = await fetch(proxyUrl);
                    const data = await response.json();
                    
                    // AllOrigins returns the page content. We look for the "canonical" link in the HTML
                    const match = data.contents.match(/<link rel="canonical" href="([^"]+)"/);
                    if (match && match[1]) {
                        finalUrl = match[1];
                    }
                }

                // Clean URL (remove FB tracking tokens)
                const urlObj = new URL(finalUrl);
                const cleanUrl = urlObj.origin + urlObj.pathname + (urlObj.searchParams.get('v') ? '?v=' + urlObj.searchParams.get('v') : '');

                // Setup Embed
                const embedUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(cleanUrl)}&show_text=0&autoplay=1`;
                
                // Detect Portrait (Reels)
                const isReel = cleanUrl.includes('reel') || cleanUrl.includes('reels');
                if (isReel) {
                    document.getElementById('vidContainer').classList.add('portrait');
                } else {
                    document.getElementById('vidContainer').classList.remove('portrait');
                }

                // Load to Iframe
                iframe.src = embedUrl;
                playingUrlTxt.innerText = cleanUrl;
                playerSection.classList.remove('hidden');

            } catch (err) {
                errorLog.innerText = "Error: Could not resolve link. Make sure it's a public video.";
                errorLog.classList.remove('hidden');
            } finally {
                btnText.innerText = "PLAY VIDEO";
            }
        }

        function toggleRatio() {
            document.getElementById('vidContainer').classList.toggle('portrait');
        }

        // Handle Enter Key
        document.getElementById('fbUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') processVideo();
        });
    </script>
</body>
</html>
